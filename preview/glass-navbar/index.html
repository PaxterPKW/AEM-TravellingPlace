<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Liquid Glass Navbar</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{

    --bg:#06080d;

    --glass:
    rgba(255,255,255,.08);

    --glass-border:
    rgba(255,255,255,.14);

    --text:#ffffff;

    --muted:#9aa4b2;
}

body{

    min-height:100vh;

    overflow:hidden;

    display:flex;
    justify-content:center;

    background:
    radial-gradient(circle at top left,
    rgba(255,255,255,.03),
    transparent 30%),

    radial-gradient(circle at bottom right,
    rgba(255,255,255,.02),
    transparent 40%),

    var(--bg);

    font-family:'Inter',sans-serif;
}

/* =========================
   FLOATING WATER BUBBLES
========================= */

.bubble{

    position:absolute;

    border-radius:50%;

    backdrop-filter:blur(20px);

    background:

    radial-gradient(
        circle at 30% 30%,
        rgba(255,255,255,.45),
        rgba(255,255,255,.08) 35%,
        rgba(255,255,255,.03) 70%
    );

    border:
    1px solid rgba(255,255,255,.15);

    box-shadow:

    inset 0 10px 30px rgba(255,255,255,.15),

    inset 0 -10px 20px rgba(0,0,0,.35),

    0 0 50px rgba(255,255,255,.03);
}

.bubble::before{

    content:"";

    position:absolute;

    width:25%;
    height:25%;

    top:18%;
    left:22%;

    border-radius:50%;

    background:
    rgba(255,255,255,.8);

    filter:blur(6px);
}

.bubble1{

    width:220px;
    height:220px;

    top:10%;
    left:8%;

    animation:
    float1 20s ease-in-out infinite;
}

.bubble2{

    width:140px;
    height:140px;

    right:10%;
    top:18%;

    animation:
    float2 24s ease-in-out infinite;
}

.bubble3{

    width:280px;
    height:280px;

    bottom:-40px;
    left:50%;

    animation:
    float3 28s ease-in-out infinite;
}

@keyframes float1{

    0%,100%{
        transform:translate(0,0) scale(1);
    }

    25%{
        transform:translate(80px,-40px) scale(1.08);
    }

    50%{
        transform:translate(40px,70px) scale(.95);
    }

    75%{
        transform:translate(-30px,20px) scale(1.05);
    }
}

@keyframes float2{

    0%,100%{
        transform:translate(0,0) scale(1);
    }

    40%{
        transform:translate(-60px,50px) scale(1.1);
    }

    70%{
        transform:translate(-10px,-40px) scale(.92);
    }
}

@keyframes float3{

    0%,100%{
        transform:translate(-50%,0) scale(1);
    }

    30%{
        transform:translate(-45%,40px) scale(1.06);
    }

    60%{
        transform:translate(-55%,-30px) scale(.95);
    }

    90%{
        transform:translate(-48%,20px) scale(1.08);
    }
}

/* =========================
      NAVBAR
========================= */

.nav{

    position:fixed;

    top:32px;
    left:50%;

    transform:translateX(-50%);

    width:min(1200px,92vw);

    height:78px;

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:0 18px;

    border-radius:30px;

    background:
    rgba(255,255,255,.06);

    backdrop-filter:blur(30px);

    border:
    1px solid rgba(255,255,255,.12);

    box-shadow:

    inset 0 1px 0 rgba(255,255,255,.2),

    0 20px 50px rgba(0,0,0,.35);

    z-index:1000;
}

.logo{

    color:white;

    font-weight:700;

    letter-spacing:4px;
}

.nav-menu{

    position:relative;

    display:flex;

    gap:6px;

    padding:8px;

    border-radius:20px;

    background:
    rgba(255,255,255,.03);
}

.indicator{

    position:absolute;

    left:8px;
    top:8px;

    width:90px;
    height:44px;

    border-radius:14px;

    background:
    rgba(255,255,255,.12);

    backdrop-filter:blur(30px);

    transition:
    all .55s cubic-bezier(.22,1,.36,1);

    box-shadow:

    inset 0 1px 0 rgba(255,255,255,.3),

    0 5px 20px rgba(255,255,255,.05);
}

.nav-item{

    width:90px;
    height:44px;

    position:relative;

    z-index:2;

    color:var(--muted);

    text-decoration:none;

    display:flex;
    justify-content:center;
    align-items:center;

    border-radius:14px;

    transition:
    .35s cubic-bezier(.22,1,.36,1);
}

.nav-item:hover{

    color:white;

    transform:
    translateY(-3px);
}

.nav-item.active{

    color:white;
}

.cta{

    height:50px;

    padding:0 22px;

    border:none;

    border-radius:14px;

    color:white;

    cursor:pointer;

    background:
    rgba(255,255,255,.08);

    border:
    1px solid rgba(255,255,255,.15);

    backdrop-filter:blur(20px);

    transition:.35s;
}

.cta:hover{

    transform:
    translateY(-3px);

    background:
    rgba(255,255,255,.15);
}

/* =========================
     MOBILE BUTTON
========================= */

.mobile-btn{

    width:46px;
    height:46px;

    display:none;

    flex-direction:column;
    justify-content:center;

    gap:6px;

    cursor:pointer;
}

.mobile-btn span{

    width:24px;
    height:2px;

    background:white;

    transition:
    .45s cubic-bezier(.22,1,.36,1);
}

.mobile-btn.active span:nth-child(1){

    transform:
    rotate(45deg)
    translate(6px,6px);
}

.mobile-btn.active span:nth-child(2){

    opacity:0;
}

.mobile-btn.active span:nth-child(3){

    transform:
    rotate(-45deg)
    translate(5px,-5px);
}

/* =========================
      MOBILE MENU
========================= */

.mobile-menu{

    position:fixed;

    top:120px;
    left:50%;

    width:92%;

    transform:
    translateX(-50%)
    translateY(-30px);

    opacity:0;
    visibility:hidden;

    padding:16px;

    border-radius:28px;

    background:
    rgba(255,255,255,.06);

    backdrop-filter:blur(30px);

    border:
    1px solid rgba(255,255,255,.12);

    transition:
    all .5s cubic-bezier(.22,1,.36,1);

    z-index:999;
}

.mobile-menu.active{

    opacity:1;
    visibility:visible;

    transform:
    translateX(-50%)
    translateY(0);
}

.mobile-link{

    display:flex;
    align-items:center;

    height:58px;

    padding:0 18px;

    margin-bottom:6px;

    color:#d6dde6;

    text-decoration:none;

    border-radius:16px;

    transition:.3s;
}

.mobile-link:hover{

    background:
    rgba(255,255,255,.08);

    color:white;
}

.mobile-link.active{

    background:
    rgba(255,255,255,.10);

    color:white;
}

.mobile-cta{

    width:100%;

    height:56px;

    border:none;

    border-radius:16px;

    margin-top:12px;

    color:white;

    cursor:pointer;

    background:
    rgba(255,255,255,.1);
}

/* =========================
      RESPONSIVE
========================= */

@media(max-width:900px){

    .nav{

        width:94%;
        height:72px;
    }

    .nav-menu{

        display:none;
    }

    .cta{

        display:none;
    }

    .mobile-btn{

        display:flex;
    }

    .bubble1{
        width:140px;
        height:140px;
    }

    .bubble2{
        width:100px;
        height:100px;
    }

    .bubble3{
        width:180px;
        height:180px;
    }
}

</style>
</head>

<body>

<div class="bubble bubble1"></div>
<div class="bubble bubble2"></div>
<div class="bubble bubble3"></div>

<nav class="nav">

    <div class="logo">
        NOVA
    </div>

    <div class="nav-menu">

        <div class="indicator"></div>

        <a class="nav-item active" href="#">Home</a>
        <a class="nav-item" href="#">Discover</a>
        <a class="nav-item" href="#">Projects</a>
        <a class="nav-item" href="#">Pricing</a>
        <a class="nav-item" href="#">Contact</a>

    </div>

    <button class="cta">
        Launch App
    </button>

    <div class="mobile-btn" id="mobileBtn">

        <span></span>
        <span></span>
        <span></span>

    </div>

</nav>

<div class="mobile-menu" id="mobileMenu">

    <a href="#" class="mobile-link active">Home</a>
    <a href="#" class="mobile-link">Discover</a>
    <a href="#" class="mobile-link">Projects</a>
    <a href="#" class="mobile-link">Pricing</a>
    <a href="#" class="mobile-link">Contact</a>

    <button class="mobile-cta">
        Launch App
    </button>

</div>

<script>

const items =
document.querySelectorAll(".nav-item");

const indicator =
document.querySelector(".indicator");

function moveIndicator(item){

    indicator.style.width =
    item.offsetWidth + "px";

    indicator.style.left =
    item.offsetLeft + "px";
}

moveIndicator(
document.querySelector(".active")
);

items.forEach(item=>{

    item.addEventListener("mouseenter",()=>{

        moveIndicator(item);
    });

    item.addEventListener("click",()=>{

        items.forEach(i=>
        i.classList.remove("active"));

        item.classList.add("active");

        moveIndicator(item);
    });

});

document
.querySelector(".nav-menu")
.addEventListener("mouseleave",()=>{

    moveIndicator(
    document.querySelector(".active")
    );
});

/* Mobile */

const mobileBtn =
document.getElementById("mobileBtn");

const mobileMenu =
document.getElementById("mobileMenu");

mobileBtn.addEventListener("click",()=>{

    mobileBtn.classList.toggle("active");

    mobileMenu.classList.toggle("active");
});

/* Auto Open On Mobile */

if(window.innerWidth <= 900){

    mobileBtn.classList.add("active");

    mobileMenu.classList.add("active");
}

</script>

</body>
</html>
